# ──────────────────────────────────────────────────────────────
# DFlash Qwen3.5-27B Uncensored — BF16 + DFlash Speculative Decoding
# Optimized for NVIDIA DGX Spark (GB10 Blackwell)
#
# Full-precision BF16 model (~52 GB) with DFlash block-diffusion
# speculative decoding for 2-5x inference speedup.
#
# Usage:
#   docker compose --env-file .env.dflash -f docker-compose.bf16.yml up -d
#
# The container will automatically download the DFlash drafter
# from HuggingFace on first run (~3.3 GB).
#
# To disable speculative decoding:
#   DFLASH_DRAFTER=off docker compose -f docker-compose.bf16.yml up -d
# ──────────────────────────────────────────────────────────────

services:
  vllm-dflash-bf16:
    image: ghcr.io/aeon-7/vllm-dflash:latest
    container_name: vllm-dflash-bf16
    environment:
      # ── Model config ──
      - MODEL_PATH=/models/DFlash-Qwen3.5-27B-Uncensored
      - SERVED_MODEL_NAME=DFlash-Qwen3.5-27B-Uncensored
      - QUANTIZATION=none
      # ── DFlash speculative decoding ──
      - DFLASH_DRAFTER=${DFLASH_DRAFTER:-z-lab/Qwen3.5-27B-DFlash}
      - DFLASH_NUM_SPEC_TOKENS=${DFLASH_NUM_SPEC_TOKENS:-15}
      # ── Resource tuning (BF16 needs more memory than NVFP4) ──
      - MAX_MODEL_LEN=${MAX_MODEL_LEN:-4096}
      - MAX_NUM_SEQS=${MAX_NUM_SEQS:-4}
      - GPU_MEMORY_UTILIZATION=${GPU_MEMORY_UTILIZATION:-0.85}
      - MAX_NUM_BATCHED_TOKENS=${MAX_NUM_BATCHED_TOKENS:-8192}
      - KV_CACHE_DTYPE=${KV_CACHE_DTYPE:-}
      # ── Runtime ──
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DISABLE_REQUIRE=1
      - NVIDIA_FORWARD_COMPAT=1
      - TORCH_MATMUL_PRECISION=high
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - VLLM_USAGE_SOURCE=production
      - HF_TOKEN=${HF_TOKEN:-}
      - VLLM_API_KEY=${VLLM_API_KEY:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      # Target model weights (~52 GB BF16)
      - ${MODEL_HOST_PATH}:/models/DFlash-Qwen3.5-27B-Uncensored
      # Drafter model cache (persists across restarts)
      - dflash-drafter-cache:/models/drafter-cache
    ipc: host
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 600s
    restart: unless-stopped
    network_mode: host

volumes:
  dflash-drafter-cache:
    driver: local
